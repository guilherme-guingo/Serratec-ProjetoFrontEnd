    <h1>Adicionar produtos</h1>
    <form id="form-produtos">
        <input type="text" id="nome-produto" placeholder="Digite o nome do produto">
        <input type="text" id="img-produto" placeholder="URL imagem do produto">
        <input type="text" id="valor-produto" placeholder="Digite o valor do produto">
        <input type="text" id="desc-produto" placeholder="Digite a descrição do produto">
        <input type="text" id="tipo-produto" placeholder="Digite o tipo do produto">
        <input type="text" id="categoria-produto" placeholder="Digite a categoria do produto">
        <button type="submit" id="envio">Enviar</button>
    </form>
