<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCare - Login e Cadastro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="usuario.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg sticky-top"> <!--nav bar: Base da Bootstrap; 
        navbar-expand-lg: Garante que a navbar fica na horizontal apenas em telas grandes;
        sticky-top: Faz o cabeçalho não desaparecer ao rodas para baixo --> 
        <div class="container">
            <a class="navbar-brand" href="#"> <!--Tag a cria hiperlinks-->
                <i class="fas fa-leaf me-2"></i>DEVCARE
            </a>
            <!--Menu mobile-->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">  
                <!--data-bs-toggle: Faz com que ao clicar no menu se abra outro menor-->
                <!--Ícone do menu-->
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav"> <!--Colapse: permite esconder o menu-->
                <ul class="navbar-nav mx-auto"> <!--navbar-nav: Cria a lista de navegação--> <!--mx-auto: Ajusta o poscionamento-->
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="sobre nós DevCare/index.html">Sobre Nós</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Produtos</a>
                    </li>
                </ul>
                <!--Ícones de Usuário, Pesquisa e Compra-->
                <div class="d-flex align-items-center gap-3">
                    <!--PESQUISA-->
                    <a href="#" class="text-dark">
                        <i class="fas fa-search"></i>
                    </a>
                    <!--USUÁRIO-->
                    <a href="#" class="text-dark">
                        <i class="far fa-user"></i>
                    </a>
                    <!--CARRINHO DE COMPRAS-->
                    <a href="carrinho-compras/index.html" class="text-dark">
                        <i class="fas fa-shopping-bag"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container my-5 d-flex justify-content-center align-items-center flex-grow-1">
        <div class="card p-4 auth-card w-100 shadow-sm" style="max-width: 450px;">
            
            <ul class="nav nav-pills nav-justified mb-4 auth-tabs" id="authTabs">
                <li class="nav-item">
                    <button class="nav-link active" id="btn-login" onclick="toggleAuth('login')">Entrar</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="btn-register" onclick="toggleAuth('register')">Cadastrar</button>
                </li>
            </ul>

            <!-- Form Login -->
            <form id="form-login" class="d-block">
                <h4 class="text-center titulo-secao mb-4">Bem-vindo de volta!</h4>
                <div class="mb-3">
                    <label for="loginEmail" class="form-label small">E-mail</label>
                    <input type="email" class="form-control input-devcare" id="loginEmail" placeholder="seu@email.com" required>
                </div>
                <div class="mb-3">
                    <label for="loginSenha" class="form-label small">Senha</label>
                    <input type="password" class="form-control input-devcare" id="loginSenha" placeholder="********" required>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4 small">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="lembrarMim">
                        <label class="form-check-label text-muted" for="lembrarMim">Lembrar de mim</label>
                    </div>
                    <a href="#" class="link-ver-todos">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="btn btn-devcare w-100">Entrar na minha conta</button>
            </form>

            <!-- Form Cadastro -->
            <form id="form-register" class="d-none">
                <h4 class="text-center titulo-secao mb-4">Crie sua conta</h4>
                <div class="mb-3">
                    <label for="regNome" class="form-label small">Nome Completo</label>
                    <input type="text" class="form-control input-devcare" id="regNome" placeholder="Seu nome" required>
                </div>
                <div class="mb-3">
                    <label for="regEmail" class="form-label small">E-mail</label>
                    <input type="email" class="form-control input-devcare" id="regEmail" placeholder="seu@email.com" required>
                </div>
                <div class="mb-4">
                    <label for="regSenha" class="form-label small">Senha</label>
                    <input type="password" class="form-control input-devcare" id="regSenha" placeholder="********" required>
                </div>
                <button type="submit" class="btn btn-devcare w-100">Finalizar Cadastro</button>
            </form>
        </div>
    </main>

    <footer class="rodape mt-auto">
        <div class="container">
            <div class="row g-4 aling-items-start justify-content-between">
                <div class="col-lg-4">
                    <a class="logo-rodape text-decoration-none" href="../index.html"><i class="fas fa-leaf me-2"></i>DEVCARE</a>
                    <p class="mt-3 slogan-rodape">Alta performance em cada fórmula. Cuidado que combine com você.</p>
                    <div class="social-icons d-flex gap-3 mt-4">
                        <a href="#"><i class="fab fa-instagram fs-5"></i></a>
                        <a href="#"><i class="fab fa-facebook-f fs-5"></i></a>
                        <a href="#"><i class="fab fa-tiktok fs-5"></i></a>
                        <a href="#"><i class="fab fa-youtube fs-5"></i></a>
                    </div>
                </div>
                <div class="col-lg-4 text-center">
                    <h5 class="mb-3">Institucional</h5>
                    <a href="#" class="text-decoration-none link-rodape d-block text-muted">Sobre Nós</a>
                </div>
                <div class="col-lg-4">
                    <h5 class="mb-3">Novidades</h5>
                    <p class="texto-rodape">Receba novidades e ofertas exclusivas.</p>
                    <div class="input-group">
                        <input type="email" class="form-control email-input" placeholder="Seu email" aria-label="Seu e-mail"> 
                        <button class="btn botao-email" type="button"><i class="fas fa-arrow-right"></i></button>
                    </div>
                </div>
            </div>
            <hr class="my-5 border-secondary opacity-25">
            <div class="text-center rodape-inferior pb-3">
                &copy; 2026 DevCare. Todos os direitos reservados.
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="usuario.js"></script>
</body>
</html>
