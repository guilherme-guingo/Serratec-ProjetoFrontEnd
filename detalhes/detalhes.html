<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"> <!--Bootstrap-->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"> <!--Utilização de Tags-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet"> <!--Fonte Poppins-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../home/style.css">
    <link rel="stylesheet" href="./detalhes.css">
    <script src="../carrinho-compras/script.js" defer></script>
    <script src="./detalhes.js" defer></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top"> <!--nav bar: Base da Bootstrap; 
        navbar-expand-lg: Garante que a navbar fica na horizontal apenas em telas grandes;
        sticky-top: Faz o cabeçalho não desaparecer ao rodas para baixo --> 
        <div class="container">
            <a class="navbar-brand" href="#"> <!--Tag a cria hiperlinks-->
                <i class="fas fa-leaf me-2"></i>DEVCARE
            </a>
            <!--Menu mobile-->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">  
                <!--data-bs-toggle: Faz com que ao clicar no menu se abra outro menor-->
                <!--Ícone do menu-->
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav"> <!--Colapse: permite esconder o menu-->
                <ul class="navbar-nav mx-auto"> <!--navbar-nav: Cria a lista de navegação--> <!--mx-auto: Ajusta o poscionamento-->
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Sobre Nós</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Produtos</a>
                    </li>
                </ul>
                <!--Ícones de Usuário, Pesquisa e Compra-->
                <div class="d-flex align-items-center gap-3">
                    <a href="#" class="text-dark">
                        <i class="fas fa-search"></i>
                    </a>
                    <a href="#" class="text-dark">
                        <i class="far fa-user"></i>
                    </a>
                    <a href="#" class="text-dark">
                        <i class="fas fa-shopping-bag"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-detalhes" id="container-detalhes">
        
    </div>



     <footer class="rodape">
        <div class="container">
            <div class="row g-4 aling-items-start justify-content-between">
                <div class="col-lg-4">
                    <a class="logo-rodape text-decoration-none" href=""></a>
                    <i class="fas fa-leaf me-2"></i>DEVCARE
                    <p class="mt-3 slogan-rodape">
                        Alta performance em cada fórmula. Cuidado que combine com você.
                    </p>
                    <!--ÍCONES REDES SOCIAIS-->
                    <div class="social-icons d-flex gap-3 mt-4">
                        <a href="#" target="_blank">
                            <i class="fab fa-instagram fs-5"></i>
                        </a>
                        <a href="#" target="_blank">
                            <i class="fab fa-facebook-f fs-5"></i>
                        </a>
                        <a href="#" target="_blank">
                            <i class="fab fa-tiktok fs-5"></i>
                        </a>
                        <a href="#">
                            <i class="fab fa-youtube fs-5"></i>
                        </a>
                    </div>
                </div>
                <div class="col-lg-4 text-center">
                    <h5 class="mb-3">
                        Institucional
                    </h5>
                    <a href="#" class="text-decoration-none link-rodape">
                        Sobre Nós
                    </a>
                </div>
                <!--Input Email-->
                <div class="col-lg-4">
                    <h5 class="mb-3">
                        Novidades
                    </h5>
                    <p class="texto-rodape">
                        Receba novidades e ofertas exclusivas.
                    </p>
                    <div class="input-group">
                        <input type="email" class="form-control email-input" placeholder="Seu email" aria-label="Seu e-mail"> 
                        <!--arial-label: Importante para garantir a acessiblidade-->
                        <button class="btn botao-email" type="button">
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            </div>
            <!--Linha Divisória-->
            <hr class="my-5 border-secondary opacity-25">
            <div class="row align-items-center flex-column flex-md-row text-center rodape-inferior">
                <div class="mb-3 mb-md-0">
                    &copy; 2026 DevCare. Todos os direitos reservados.
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
